<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50"
  (click)="onBackdropClick()"
>
  <div
    class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4"
    (click)="stopPropagation($event)"
  >
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-4 border-b border-gray-200">
      <h3 class="text-lg font-semibold text-gray-900"></h3>
      <button
        (click)="onClose()"
        class="text-gray-400 hover:text-gray-600 transition-colors"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-4">
      <textarea
        [(ngModel)]="editedText"
        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        rows="4"
        autofocus
      ></textarea>
    </div>

    <!-- Modal Footer -->
    <div class="flex justify-end gap-3 p-4 border-t border-gray-200">
      <button
        (click)="onClose()"
        class="px-4 py-2 text-gray-700 bg-gray-200 rounded-md hover:bg-gray-300 transition-colors"
      >
        Cancel
      </button>
      <button
        (click)="onSave()"
        class="px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors"
      >
        Save
      </button>
    </div>
  </div>
</div>
